version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: ims-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: ims-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: ims-postgres
    environment:
      POSTGRES_USER: ims_user
      POSTGRES_PASSWORD: ims_pass
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ims-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      - mongo
      - redis
      - postgres

  frontend:
    build: ./frontend
    container_name: ims-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
  postgres_data: